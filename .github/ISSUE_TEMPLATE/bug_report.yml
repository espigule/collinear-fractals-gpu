name: Bug report
description: Report a reproducible problem in the explorer or companion packages.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for another researcher or maintainer to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Browser explorer
        - JavaScript package
        - Python package
        - Swift package
        - Wolfram Language package
        - MATLAB package
        - Maple package
        - Documentation
        - Release infrastructure
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include commands, parameters, browser/runtime versions, and input values.
      placeholder: |
        1. Open index.html
        2. Set n = 3, k_max = 37
        3. Select c = ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: certificate
    attributes:
      label: Certificate or sample output
      description: Paste certificate JSON or a minimal command output when relevant.
      render: json
    validations:
      required: false
