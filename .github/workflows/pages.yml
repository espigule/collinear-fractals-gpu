# Multiline workflow YAML; formatting is checked by tools/validate_bundle.py.
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static explorer
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage static site
        run: |
          mkdir -p site
          cp index.html index.css explorer.js .nojekyll site/
          if [ -d gallery ]; then
            mkdir -p site/gallery
            find gallery -maxdepth 2 -type f \( -name 'README.md' -o -name 'index.json' -o -name '*.webp' -o -name '*.png' -o -name '*.svg' \) -exec sh -c 'mkdir -p "site/$(dirname "$1")"; cp "$1" "site/$1"' sh {} \;
          fi
          if [ -d examples ]; then
            mkdir -p site/examples
            cp examples/examples.json site/examples/
            find examples -maxdepth 2 -type f \( -name 'config.json' -o -name 'metadata.json' -o -name 'notes.md' \) -exec sh -c 'mkdir -p "site/$(dirname "$1")"; cp "$1" "site/$1"' sh {} \;
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
